<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Analytics Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Student Performance Analytics Portal</h1>
    <p>Interactive Dashboard</p>
</header>

<div class="menu-btn" onclick="toggleMenu()">☰ Menu</div>

<nav id="navMenu">
    <a href="#login">Login</a>
    <a href="#dashboard">Dashboard</a>
    <a href="#report">Report</a>
    <a href="#contact">Contact</a>
</nav>

<section id="login">
    <h2>Login Form</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button type="submit">Login</button>
    </form>
</section>

<section id="dashboard">

    <h2>Student Dashboard</h2>

    <div class="cards">

        <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents"></p>
        </div>

        <div class="card">
            <h3>Average Marks</h3>
            <p id="averageMarks"></p>
        </div>

        <div class="card">
            <h3>Passed Students</h3>
            <p id="passedStudents"></p>
        </div>

    </div>

    <input
        type="text"
        id="searchInput"
        placeholder="Search Student"
    >

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>

    </table>

</section>

<section id="report">

    <h2>Performance Report</h2>

    <form id="reportForm">

        <input type="text" id="studentName" placeholder="Student Name">

        <input type="text" id="studentClass" placeholder="Class">

        <input type="number" id="studentMarks" placeholder="Marks">

        <button type="submit">Add Student</button>

    </form>

</section>

<section id="contact">

    <h2>Contact Us</h2>

    <form>

        <input type="text" placeholder="Your Name">

        <input type="email" placeholder="Your Email">

        <textarea placeholder="Your Message"></textarea>

        <button type="button" onclick="sendMessage()">
            Send Message
        </button>

    </form>

</section>

<footer>
    <p>© 2026 Student Performance Portal</p>
</footer>

<script src="script.js"></script>

</body>
</html>
